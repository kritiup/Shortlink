<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Visiting a short link flows browser to web to redirect to redis and returns a 302 instantly. The redirect pushes the click onto a Redis list, and separately the analytics worker drains that list and writes the total to Postgres.</desc>
