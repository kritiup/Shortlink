# Served by the unprivileged nginx image, which listens on 8080 as a non-root
# user. This one server is both the static file host for the React build and
# the reverse proxy that fronts the backend services.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # control-plane API (path is preserved: /api/... -> api:3000/api/...)
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # redirect hot path (trailing slash strips /r/ -> redirect:8080/<code>)
    location /r/ {
        proxy_pass http://redirect:8080/;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $remote_addr;
    }

    location = /healthz { return 200 "ok\n"; }

    # single-page-app fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
