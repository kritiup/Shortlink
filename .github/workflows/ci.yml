name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [web, api, redirect, analytics]
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build image (with SBOM + provenance)
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          load: true
          tags: shortlink-${{ matrix.service }}:ci
          sbom: true
          provenance: true

      - name: CVE gate (fail on fixable CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shortlink-${{ matrix.service }}:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  # Push only from main, and only if registry creds are configured as secrets.
  push:
    needs: build-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [web, api, redirect, analytics]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Log in to the registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      - name: Build + push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ secrets.REGISTRY }}/shortlink-${{ matrix.service }}:${{ github.sha }}
          sbom: true
          provenance: true
